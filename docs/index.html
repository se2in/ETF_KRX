<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>유진증권 안상현 센터장의 ETF 변동율 체크 대쉬보드</title>
  <style>
    :root { color-scheme: dark; --bg: #050608; --panel: #101318; --line: #2a3038; --text: #f2f5f8; --muted: #9aa6b2; --amber: #f5b301; --cyan: #3dd6e8; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); letter-spacing: 0; }
    header { border-bottom: 1px solid var(--line); background: linear-gradient(180deg, #111821 0%, #07090c 100%); padding: 18px 22px 16px; }
    .topline { display: flex; align-items: center; gap: 10px; color: var(--amber); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .ticker-dot { width: 9px; height: 9px; background: var(--amber); display: inline-block; }
    h1 { margin: 10px 0 8px; font-size: clamp(22px, 3vw, 34px); line-height: 1.2; }
    p { color: var(--muted); line-height: 1.7; }
    main { padding: 18px 22px 44px; }
    .panel { max-width: 900px; background: var(--panel); border: 1px solid var(--line); border-left: 4px solid var(--amber); border-radius: 4px; padding: 18px; }
    .status { color: var(--cyan); font-weight: 800; font-size: 13px; text-transform: uppercase; }
    @media (max-width: 720px) { main { padding: 14px; } header { padding: 16px 14px; } }
  </style>
</head>
<body>
  <header>
    <div class="topline"><span class="ticker-dot"></span> YUJIN SECURITIES | ACTIVE ETF MONITOR</div>
    <h1>유진증권 안상현 센터장의 ETF 변동율 체크 대쉬보드</h1>
    <p>KRX PDF 보유종목 변화 리포트</p>
  </header>
  <main>
    <section class="panel">
      <div class="status">REPORT READY AFTER FIRST RUN</div>
      <p>아직 생성된 ETF 리포트가 없습니다. <strong>run_collect_publish.bat</strong>를 실행하면 이 페이지가 최신 ETF 변화 대쉬보드로 바뀍니다.</p>
    </section>
  </main>
</body>
</html>
